# Workflow oficial do GitHub para build e deploy do Viral Hack no GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js (versão 20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependências
        run: npm ci || npm install

      - name: Build do projeto estático
        run: npm run build

      - name: Configurar ambiente do Pages
        uses: actions/configure-pages@v5

      - name: Upload dos artefatos compilados
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
